        }

    <script type="text/javascript">
      !function(o, c) {
        var n = c.documentElement,

    <!-- Smooth Scroll (Lenis) — deferred, init after window load -->
    <script src="/js/lenis.js" type="text/javascript" defer></script>
    <script type="text/javascript">
      // Deferred scripts finish executing after DOMContentLoaded,
      // so we use 'load' event to guarantee Lenis global is available.
      window.addEventListener('load', function () {
        if (typeof Lenis === 'undefined') return;
        var lenis = new Lenis({
          duration: 1.2,
          easing: function(t) { return Math.min(1, 1.001 - Math.pow(2, -10 * t)); },
          smooth: true,
          smoothTouch: false,
        });
        function raf(time) {
          lenis.raf(time);
          requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);
      });
    </script>
